<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gary Jones Chiropractic — Practice Manager</title>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --navy:#1B3A6B;--navy-light:#2D5282;--navy-pale:#EBF4FF;
  --green-pale:#F0FFF4;--green-mid:#9AE6B4;--green-text:#276749;
  --amber-pale:#FFFBEB;--amber-text:#975A16;
  --red-pale:#FFF5F5;--red-mid:#FC8181;--red-text:#C53030;
  --bg:#F7F8FA;--surface:#fff;--border:#E2E8F0;--border-light:#EDF2F7;
  --text:#1A202C;--text-muted:#718096;--text-light:#A0AEC0;
  --radius:8px;--radius-lg:12px;
}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;font-size:14px}
input,textarea,select{font-family:inherit;font-size:14px;padding:8px 10px;border:1px solid var(--border);border-radius:var(--radius);background:var(--surface);color:var(--text);width:100%;outline:none;transition:border-color 0.15s,box-shadow 0.15s}
input:focus,textarea:focus,select:focus{border-color:var(--navy);box-shadow:0 0 0 3px rgba(27,58,107,0.08)}
textarea{resize:vertical;line-height:1.6}
label{font-size:13px;color:var(--text-muted);font-weight:500;display:block;margin-bottom:4px}
button{font-family:inherit;cursor:pointer;transition:all 0.15s}
.btn{background:var(--navy);color:#fff;border:none;border-radius:var(--radius);padding:9px 18px;font-size:14px;font-weight:500}
.btn:hover:not(:disabled){background:var(--navy-light)}
.btn:disabled{opacity:0.4;cursor:not-allowed}
.btn-outline{background:transparent;color:var(--text);border:1px solid var(--border);border-radius:var(--radius);padding:9px 18px;font-size:14px}
.btn-outline:hover{background:var(--bg)}
.btn-sm{padding:5px 12px;font-size:13px}
.btn-danger{background:var(--red-text);color:#fff;border:none;border-radius:var(--radius);padding:9px 18px;font-size:14px}
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:1.25rem}
.field{margin-bottom:1rem}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.sec{font-size:11px;font-weight:600;color:var(--text-light);text-transform:uppercase;letter-spacing:0.07em;padding-bottom:8px;border-bottom:1px solid var(--border-light);margin-bottom:14px}
.badge{display:inline-block;padding:2px 9px;border-radius:20px;font-size:12px;font-weight:500}
.b-blue{background:var(--navy-pale);color:var(--navy)}
.b-green{background:var(--green-pale);color:var(--green-text)}
.b-amber{background:var(--amber-pale);color:var(--amber-text)}
.b-red{background:var(--red-pale);color:var(--red-text)}
.ptrow{padding:11px 16px;border-bottom:1px solid var(--border-light);cursor:pointer;display:flex;align-items:center;gap:12px;transition:background 0.1s}
.ptrow:hover{background:var(--bg)}
.navitem{padding:8px 12px;border-radius:var(--radius);cursor:pointer;font-size:14px;display:flex;align-items:center;gap:9px;transition:background 0.1s;color:rgba(255,255,255,0.65);margin-bottom:2px}
.navitem:hover,.navitem.active{background:rgba(255,255,255,0.13);color:#fff}
.check-row{padding:8px 10px;border-radius:var(--radius);border:1px solid var(--border);display:flex;align-items:center;gap:9px;cursor:pointer;margin-bottom:6px;transition:background 0.1s}
.check-row:hover{background:var(--bg)}
.check-row.on{background:var(--green-pale);border-color:var(--green-mid)}
.flag-row{padding:8px 10px;border-radius:var(--radius);border:1px solid var(--border);display:flex;align-items:flex-start;gap:9px;cursor:pointer;margin-bottom:6px;transition:background 0.1s}
.flag-row.on{background:var(--red-pale);border-color:var(--red-mid)}
.note-card{padding:12px 14px;border:1px solid var(--border);border-radius:var(--radius);cursor:pointer;margin-bottom:8px;transition:background 0.1s}
.note-card:hover{background:var(--bg)}
.pill{display:inline-flex;align-items:center;gap:4px;padding:3px 10px;border-radius:20px;font-size:12px}
.step-prog{height:4px;border-radius:2px;background:var(--border);margin-bottom:16px}
.step-prog-fill{height:4px;border-radius:2px;background:var(--navy);transition:width 0.3s}
</style>
</head>
<body>
<div id="app"></div>
<script>

const NAVY='#1B3A6B';
const RED_FLAGS=[
  {id:'bowel',label:'Bowel or bladder dysfunction',critical:true},
  {id:'weakness',label:'Unexplained muscle weakness',critical:true},
  {id:'constitutional',label:'Constitutional symptoms (fever, weight loss, night sweats)',critical:true},
  {id:'saddle',label:'Saddle anaesthesia',critical:true},
  {id:'malignancy',label:'History of malignancy',critical:true},
  {id:'trauma',label:'Recent significant trauma',critical:false},
  {id:'age50',label:'First episode of back pain over age 50',critical:false},
];
const STEPS=['Feet and ankles','Knees','Hips','Sacrum and coccyx','Lumbar (L1–L5)','Thoracolumbar junction','Mid-thoracic','Cervicothoracic junction','Cervical (C1–C7)','Occiput and atlas','Pelvis and SI joints','Final alignment check'];
const EXERCISES=[
  {id:'abc',label:'ABC — neck mobility'},
  {id:'wagging',label:'Wagging dog — spinal mobility'},
  {id:'shuffle',label:'Shoulder shuffle — thoracic'},
  {id:'rotation',label:'Body rotation — torso'},
];

// ── UTILITIES ──────────────────────────────────────────────────────
function age(dob){if(!dob)return'';const d=new Date(dob),n=new Date();let a=n.getFullYear()-d.getFullYear();if(n<new Date(n.getFullYear(),d.getMonth(),d.getDate()))a--;return a;}
function initials(name){return(name||'?').split(' ').map(w=>w[0]||'').join('').slice(0,2).toUpperCase();}
function fmtDate(s){if(!s)return'';const d=new Date(s);return isNaN(d)?s:d.toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'numeric'});}
function initNote(){return{id:Date.now(),date:new Date().toISOString().split('T')[0],type:'',synopsis:'',s:{complaint:'',history:'',pain:5,flags:[]},o:{posture:'',rom:'',palpation:'',steps:[]},a:{impression:'',differential:''},p:{treatment:'',exercises:[],education:'',followup:''}};}

// ── JANEAPP IMPORTER ───────────────────────────────────────────────
function parseJane(arrayBuffer){
  const wb=XLSX.read(arrayBuffer,{type:'array'});
  const ws=wb.Sheets[wb.SheetNames[0]];
  const rows=XLSX.utils.sheet_to_json(ws,{defval:''});
  const active=rows.filter(r=>{
    const a=String(r['Active']||'').toLowerCase();
    return a==='true'&&!r['Discharged At'];
  });
  return active.map(r=>{
    const phone=String(r['Mobile Phone']||r['Home Phone']||r['Work Phone']||'').trim();
    const addr=[r['Street Address'],r['Street Address 2'],r['City'],r['Province'],r['Postal']].filter(x=>x&&String(x).trim()).map(x=>String(x).trim()).join(', ');
    const fn=String(r['First Name']||'').trim();
    const ln=String(r['Last Name']||'').trim();
    const dob=r['Birth Date']?String(r['Birth Date']).split(' ')[0]:'';
    const joined=r['First Visit']?String(r['First Visit']).split(' ')[0]:'';
    const last=r['Last Visit']?String(r['Last Visit']).split(' ')[0]:'';
    return{
      id:String(r['patient_guid']||r['Patient Number']||Math.random()),
      patientNumber:String(r['Patient Number']||''),
      name:(fn+' '+ln).trim(),
      preferredName:String(r['Preferred Name']||'').trim(),
      email:String(r['Email']||'').trim(),
      phone,
      address:addr,
      dob,
      sex:String(r['Sex']||r['Gender']||'').trim(),
      referral:String(r['Referral Source']||'').trim(),
      gp:String(r['Family Doctor']||'').trim(),
      gpPhone:String(r['Family Doctor Phone']||'').trim(),
      medAlert:String(r['Medical Alert']||'').trim(),
      occupation:String(r['Occupation']||'').trim(),
      employer:String(r['Employer']||'').trim(),
      emergencyName:String(r['Emergency Contact Name']||'').trim(),
      emergencyPhone:String(r['Emergency Contact Phone']||'').trim(),
      emergencyRel:String(r['Emergency Contact Relationship']||'').trim(),
      joined,lastVisit:last,
      notes:[],
      imported:true,
    };
  });
}

// ── COMPONENTS ─────────────────────────────────────────────────────
function Avatar({name,size=36}){
  const bg=['#1B3A6B','#276749','#744210','#553C9A','#086F83','#822727'];
  const idx=(name||'').charCodeAt(0)%bg.length;
  return h('div',{style:{width:size,height:size,borderRadius:'50%',background:bg[idx],color:'#fff',display:'flex',alignItems:'center',justifyContent:'center',fontSize:Math.round(size*0.34),fontWeight:600,flexShrink:0}},initials(name));
}

function Sidebar({view,setView,patientCount,onLogout}){
  const items=[['patients','Patients',`${patientCount}`]];
  return h('div',{style:{width:220,background:NAVY,display:'flex',flexDirection:'column',minHeight:'100vh',flexShrink:0}},
    h('div',{style:{padding:'1.25rem 1rem .75rem'}},
      h('div',{style:{fontSize:11,color:'rgba(255,255,255,0.4)',letterSpacing:'.08em',fontWeight:600,marginBottom:3}},'GARY JONES CHIROPRACTIC'),
      h('div',{style:{fontSize:16,color:'#fff',fontWeight:600}},'Practice Manager'),
      h('div',{style:{fontSize:11,color:'rgba(255,255,255,0.4)',marginTop:3}},'GCC Compliant')
    ),
    h('div',{style:{flex:1,padding:'4px 8px'}},
      items.map(([key,label,count])=>
        h('div',{key,className:`navitem${view===key?' active':''}`,onClick:()=>setView(key)},
          h('svg',{width:15,height:15,fill:'none',stroke:'currentColor',strokeWidth:2,viewBox:'0 0 24 24'},
            h('path',{d:'M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2'}),
            h('circle',{cx:9,cy:7,r:4}),
            h('path',{d:'M23 21v-2a4 4 0 0 0-3-3.87M16 3.13a4 4 0 0 1 0 7.75'})
          ),
          h('span',{style:{flex:1}},label),
          count&&h('span',{style:{background:'rgba(255,255,255,0.15)',color:'rgba(255,255,255,0.8)',borderRadius:20,padding:'1px 7px',fontSize:12}},count)
        )
      )
    ),
    h('div',{style:{padding:'1rem',borderTop:'1px solid rgba(255,255,255,0.08)'}},
      h('div',{style:{display:'flex',alignItems:'center',gap:8,marginBottom:10}},
        h('div',{style:{width:30,height:30,borderRadius:'50%',background:'rgba(255,255,255,0.15)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:12,color:'#fff',fontWeight:600}},'GJ'),
        h('div',null,
          h('div',{style:{fontSize:13,color:'#fff',fontWeight:500}},'Gary Jones DC'),
          h('div',{style:{fontSize:11,color:'rgba(255,255,255,0.45)'}},'\uD83D\uDD12 GCC Registered')
        )
      ),
      h('button',{className:'btn-outline btn-sm',style:{width:'100%',color:'rgba(255,255,255,0.6)',borderColor:'rgba(255,255,255,0.2)',fontSize:13},onClick:onLogout},'Sign out')
    )
  );
}

// ── LOGIN ──────────────────────────────────────────────────────────
function Login({onLogin}){
  return h('div',{style:{minHeight:'100vh',display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',background:'#F7F8FA',padding:'2rem'}},
    h('div',{style:{background:'#fff',border:'1px solid #E2E8F0',borderRadius:16,padding:'2.5rem 2rem',width:'100%',maxWidth:380,textAlign:'center'}},
      h('div',{style:{width:52,height:52,background:NAVY,borderRadius:12,display:'flex',alignItems:'center',justifyContent:'center',margin:'0 auto 1.25rem'}},
        h('svg',{width:26,height:26,fill:'none',stroke:'#fff',strokeWidth:2,viewBox:'0 0 24 24'},
          h('path',{d:'M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5'})
        )
      ),
      h('div',{style:{fontSize:11,color:'#718096',fontWeight:600,letterSpacing:'.06em',marginBottom:4}},'GARY JONES CHIROPRACTIC'),
      h('div',{style:{fontSize:22,fontWeight:700,color:'#1A202C',marginBottom:6}},'Practice Manager'),
      h('div',{style:{fontSize:13,color:'#718096',marginBottom:'2rem'}},'GCC-compliant clinical records system'),
      h('button',{className:'btn',style:{width:'100%',display:'flex',alignItems:'center',justifyContent:'center',gap:10,marginBottom:14,padding:'11px 18px',fontSize:15},onClick:()=>onLogin('Gary Jones DC')},
        h('svg',{width:18,height:18,viewBox:'0 0 24 24',fill:'currentColor'},h('path',{d:'M12.545,10.239v3.821h5.445c-0.712,2.315-2.647,3.972-5.445,3.972c-3.332,0-6.033-2.701-6.033-6.032s2.701-6.032,6.033-6.032c1.498,0,2.866,0.549,3.921,1.453l2.814-2.814C17.503,2.988,15.139,2,12.545,2C7.021,2,2.543,6.477,2.543,12s4.478,10,10.002,10c8.396,0,10.249-7.85,9.426-11.748L12.545,10.239z'})),
        'Sign in with Google'
      ),
      h('div',{style:{fontSize:12,color:'#718096',padding:'10px 12px',background:'#F7F8FA',borderRadius:8,lineHeight:1.5}},'Demo: In production, this authenticates via your Google account with 2FA. Patient data is stored in your own Google Sheets.')
    )
  );
}

// ── IMPORT SCREEN ──────────────────────────────────────────────────
function ImportScreen({onImport,existing}){
  const [status,setStatus]=React.useState('idle');
  const [count,setCount]=React.useState(0);
  const [err,setErr]=React.useState('');
  const fileRef=React.useRef();

  function handleFile(e){
    const file=e.target.files[0];
    if(!file)return;
    setStatus('reading');setErr('');
    const reader=new FileReader();
    reader.onload=ev=>{
      try{
        const pts=parseJane(ev.target.result);
        setCount(pts.length);
        setStatus('done');
        onImport(pts);
      }catch(ex){setErr('Could not parse file: '+ex.message);setStatus('error');}
    };
    reader.onerror=()=>{setErr('Could not read file.');setStatus('error');};
    reader.readAsArrayBuffer(file);
  }

  return h('div',{style:{flex:1,overflowY:'auto',padding:'2rem',maxWidth:620}},
    h('div',{style:{fontSize:20,fontWeight:700,marginBottom:6}},'Import from Janeapp'),
    h('div',{style:{fontSize:14,color:'#718096',marginBottom:'1.5rem'}},'Upload your Janeapp patient export to import all active patient records.'),

    existing>0&&h('div',{style:{background:'#F0FFF4',border:'1px solid #9AE6B4',borderRadius:10,padding:'12px 16px',marginBottom:'1.25rem',display:'flex',alignItems:'center',gap:10}},
      h('span',{style:{fontSize:18}},'✓'),
      h('div',null,
        h('div',{style:{fontWeight:600,color:'#276749'}},'Patients already imported'),
        h('div',{style:{fontSize:13,color:'#276749'}},''+existing+' active patient records loaded. Upload a new file to replace.')
      )
    ),

    h('div',{className:'card',style:{marginBottom:'1.25rem'}},
      h('div',{className:'sec'},'How to export from Janeapp'),
      h('div',{style:{display:'flex',flexDirection:'column',gap:10}},
        ['Reports → List → filter to your name','Click the three dots → Export to Excel','Save the .xlsx file','Upload it below'].map((s,i)=>
          h('div',{key:i,style:{display:'flex',alignItems:'center',gap:10}},
            h('div',{style:{width:22,height:22,borderRadius:'50%',background:NAVY,color:'#fff',fontSize:12,fontWeight:700,display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0}},i+1),
            h('span',{style:{fontSize:14}},s)
          )
        )
      )
    ),

    h('div',{className:'card'},
      h('div',{className:'sec'},'Upload patient export (.xlsx)'),
      status==='done'
        ? h('div',{style:{textAlign:'center',padding:'1.5rem 0'}},
            h('div',{style:{fontSize:36,marginBottom:8}},'✓'),
            h('div',{style:{fontSize:18,fontWeight:700,color:'#276749',marginBottom:4}},''+count+' patients imported'),
            h('div',{style:{fontSize:14,color:'#718096',marginBottom:'1rem'}},'All active records loaded into your practice manager.'),
            h('button',{className:'btn-outline btn-sm',onClick:()=>{setStatus('idle');setCount(0);}},'Upload a different file')
          )
        : h('div',null,
            h('div',{style:{border:'2px dashed #CBD5E0',borderRadius:10,padding:'2rem',textAlign:'center',cursor:'pointer',background:'#F7F8FA'},
              onClick:()=>fileRef.current.click(),
              onDragOver:e=>e.preventDefault(),
              onDrop:e=>{e.preventDefault();const f=e.dataTransfer.files[0];if(f){fileRef.current.files=e.dataTransfer.files;handleFile({target:{files:[f]}});}}
            },
              h('div',{style:{fontSize:32,marginBottom:8}},'📂'),
              status==='reading'
                ? h('div',{style:{fontSize:14,color:'#718096'}},'Reading file...')
                : h('div',null,
                    h('div',{style:{fontWeight:600,marginBottom:4}},'Drop your .xlsx file here'),
                    h('div',{style:{fontSize:13,color:'#718096'}},
                      'or ',h('span',{style:{color:NAVY,textDecoration:'underline'}},'click to browse')
                    )
                  )
            ),
            err&&h('div',{style:{marginTop:10,padding:'10px 12px',background:'#FFF5F5',border:'1px solid #FC8181',borderRadius:8,fontSize:13,color:'#C53030'}},err),
            h('input',{ref:fileRef,type:'file',accept:'.xlsx,.xls',style:{display:'none'},onChange:handleFile})
          )
    )
  );
}

// ── PATIENT LIST ───────────────────────────────────────────────────
function PatientList({patients,onSelect,onNew,onImport}){
  const [q,setQ]=React.useState('');
  const [sort,setSort]=React.useState('name');
  const filtered=React.useMemo(()=>{
    let list=patients.filter(p=>{
      if(!q)return true;
      const ql=q.toLowerCase();
      return p.name.toLowerCase().includes(ql)||
        (p.email||'').toLowerCase().includes(ql)||
        (p.phone||'').includes(q)||
        (p.patientNumber||'').includes(q)||
        (p.address||'').toLowerCase().includes(ql);
    });
    if(sort==='name')list=[...list].sort((a,b)=>a.name.localeCompare(b.name));
    else if(sort==='recent')list=[...list].sort((a,b)=>(b.lastVisit||'').localeCompare(a.lastVisit||''));
    else if(sort==='joined')list=[...list].sort((a,b)=>(b.joined||'').localeCompare(a.joined||''));
    return list;
  },[patients,q,sort]);

  return h('div',{style:{flex:1,display:'flex',flexDirection:'column',minHeight:0}},
    h('div',{style:{padding:'1.25rem 1.5rem .75rem',borderBottom:'1px solid #E2E8F0',background:'#fff',display:'flex',alignItems:'center',gap:12,flexWrap:'wrap'}},
      h('div',{style:{flex:1}},
        h('div',{style:{fontSize:18,fontWeight:700}},'Patients'),
        h('div',{style:{fontSize:13,color:'#718096'}},patients.length+' active records')
      ),
      patients.length===0&&h('button',{className:'btn-outline btn-sm',onClick:onImport},'⬆ Import from Janeapp'),
      h('button',{className:'btn btn-sm',onClick:onNew},'+ New patient')
    ),
    h('div',{style:{padding:'10px 1.5rem',borderBottom:'1px solid #E2E8F0',background:'#fff',display:'flex',gap:10,alignItems:'center'}},
      h('input',{placeholder:'Search name, email, phone, address or patient number...',value:q,onChange:e=>setQ(e.target.value),style:{maxWidth:400}}),
      h('select',{value:sort,onChange:e=>setSort(e.target.value),style:{width:'auto',minWidth:140}},
        h('option',{value:'name'},'Sort: A–Z'),
        h('option',{value:'recent'},'Sort: Recent visit'),
        h('option',{value:'joined'},'Sort: Newest first')
      )
    ),
    h('div',{style:{flex:1,overflowY:'auto',background:'#fff'}},
      patients.length===0
        ? h('div',{style:{padding:'3rem',textAlign:'center'}},
            h('div',{style:{fontSize:40,marginBottom:12}},'📋'),
            h('div',{style:{fontSize:16,fontWeight:600,marginBottom:6}},'No patients yet'),
            h('div',{style:{fontSize:14,color:'#718096',marginBottom:'1.25rem'}},'Import your Janeapp export or add patients manually.'),
            h('button',{className:'btn',onClick:onImport},'⬆ Import from Janeapp')
          )
        : filtered.length===0
          ? h('div',{style:{padding:'2rem',textAlign:'center',color:'#718096'}},'No patients match "'+q+'"')
          : filtered.map(p=>
              h('div',{key:p.id,className:'ptrow',onClick:()=>onSelect(p)},
                h(Avatar,{name:p.name}),
                h('div',{style:{flex:1,minWidth:0}},
                  h('div',{style:{fontWeight:600,fontSize:14}},p.name,p.preferredName&&h('span',{style:{fontWeight:400,color:'#718096',fontSize:13}},' ('+p.preferredName+')')),
                  h('div',{style:{fontSize:12,color:'#718096',whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis'}},
                    [p.phone,p.email].filter(Boolean).join(' · ')
                  )
                ),
                h('div',{style:{textAlign:'right',flexShrink:0}},
                  p.medAlert&&h('div',{style:{marginBottom:3}},h('span',{className:'badge b-red',style:{fontSize:11}},'⚠ Alert')),
                  h('div',{style:{fontSize:12,color:'#718096'}},p.notes.length+' note'+(p.notes.length!==1?'s':'')),
                  p.lastVisit&&h('div',{style:{fontSize:11,color:'#A0AEC0'}},fmtDate(p.lastVisit))
                )
              )
            )
    )
  );
}

// ── PATIENT DETAIL ────────────────────────────────────────────────
function PatientDetail({patient,onBack,onNewNote,onViewNote}){
  return h('div',{style:{flex:1,overflowY:'auto',padding:'1.5rem'}},
    h('button',{className:'btn-outline btn-sm',style:{marginBottom:'1rem'},onClick:onBack},'← Back'),
    h('div',{style:{display:'flex',alignItems:'flex-start',justifyContent:'space-between',marginBottom:'1.25rem',flexWrap:'wrap',gap:10}},
      h('div',{style:{display:'flex',alignItems:'center',gap:14}},
        h(Avatar,{name:patient.name,size:50}),
        h('div',null,
          h('div',{style:{fontSize:20,fontWeight:700}},patient.name,
            patient.preferredName&&h('span',{style:{fontWeight:400,color:'#718096',fontSize:15,marginLeft:6}},'('+patient.preferredName+')')
          ),
          h('div',{style:{fontSize:13,color:'#718096',marginTop:2}},

    ),

    h('div',{className:'card'},
      h('div',{className:'sec'},'Clinical notes ('+patient.notes.length+')'),

        ? h('div',{style:{fontSize:14,color:'#718096',padding:'1rem 0'}},

            return h('div',{key:n.id,className:'note-card',onClick:()=>onViewNote(n)},

// ── SOAP FORM ──────────────────────────────────────────────────────
function SOAPForm({patient,onSave,onCancel}){
  const [note,setNote]=React.useState(initNote());
  const [step,setStep]=React.useState(0);
  const steps=['Type','Subjective','Objective','Assessment','Plan'];

  function upS(k,v){setNote(n=>({...n,s:{...n.s,[k]:v}}))}
  function upO(k,v){setNote(n=>({...n,o:{...n.o,[k]:v}}))}
  function upA(k,v){setNote(n=>({...n,a:{...n.a,[k]:v}}))}
  function upP(k,v){setNote(n=>({...n,p:{...n.p,[k]:v}}))}
  function togFlag(label){upS('flags',note.s.flags.includes(label)?note.s.flags.filter(f=>f!==label):[...note.s.flags,label]);}
  function togStep(s){upO('steps',note.o.steps.includes(s)?note.o.steps.filter(x=>x!==s):[...note.o.steps,s]);}
  function togEx(id){upP('exercises',note.p.exercises.includes(id)?note.p.exercises.filter(x=>x!==id):[...note.p.exercises,id]);}

  const pct=Math.round((step/4)*100);

  const header=h('div',{style:{marginBottom:'1.25rem'}},
    h('button',{className:'btn-outline btn-sm',style:{marginBottom:10},onClick:step===0?onCancel:()=>setStep(step-1)},step===0?'× Cancel':'← Back'),
    h('div',{style:{display:'flex',alignItems:'baseline',gap:10,marginBottom:8}},
      h('div',{style:{fontSize:16,fontWeight:700}},steps[step]),
      h('span',{style:{fontSize:13,color:'#718096'}},patient.name+' · '+note.type)
    ),
    h('div',{className:'step-prog'},h('div',{className:'step-prog-fill',style:{width:pct+'%'}})),
    h('div',{style:{display:'flex',gap:6}},steps.map((s,i)=>
      h('span',{key:s,style:{fontSize:12,color:i===step?NAVY:i<step?'#276749':'#A0AEC0',fontWeight:i<=step?600:400}},i>0?'→ ':null,s)
    ))
  );

  if(step===0)return h('div',{style:{flex:1,overflowY:'auto',padding:'1.5rem',maxWidth:560}},
    header,
    h('div',{className:'card'},
      h('div',{className:'field'},h('label',null,'Date'),h('input',{type:'date',value:note.date,onChange:e=>setNote(n=>({...n,date:e.target.value}))})),
      h('div',{style:{marginBottom:'1.25rem'}},
        h('label',{style:{marginBottom:8}},'Session type'),
        ['New Patient Visit','Free Mini Assessment','Standard Treatment'].map(t=>
          h('div',{key:t,className:`check-row${note.type===t?' on':''}`,onClick:()=>setNote(n=>({...n,type:t}))},
            h('div',{style:{width:18,height:18,borderRadius:'50%',border:`2px solid ${note.type===t?'#276749':'#CBD5E0'}`,background:note.type===t?'#9AE6B4':'transparent',flexShrink:0}}),
            h('span',{style:{fontSize:14}},t)
          )
        )
      ),
      h('div',{className:'field'},
        h('label',null,'Synopsis'),
        h('textarea',{rows:3,value:note.synopsis,onChange:e=>setNote(n=>({...n,synopsis:e.target.value})),placeholder:'Brief summary of presentation and findings. End with: Standard McTimoney protocol delivered.'}),
        h('div',{style:{fontSize:11,color:'#718096',marginTop:3}},'Must end with: Standard McTimoney protocol delivered.')
      ),
      h('div',{style:{display:'flex',justifyContent:'flex-end'}},
        h('button',{className:'btn',disabled:!note.type||!note.synopsis,onClick:()=>setStep(1)},'Next: Subjective →')
      )
    )
  );

  if(step===1)return h('div',{style:{flex:1,overflowY:'auto',padding:'1.5rem',maxWidth:620}},
    header,
    h('div',{className:'card',style:{marginBottom:'1rem'}},
      h('div',{className:'field'},h('label',null,'Chief complaint'),h('textarea',{rows:2,value:note.s.complaint,onChange:e=>upS('complaint',e.target.value),placeholder:"Patient's primary complaint in their own words..."})),
      h('div',{className:'field'},h('label',null,'History of complaint'),h('textarea',{rows:3,value:note.s.history,onChange:e=>upS('history',e.target.value),placeholder:'Onset, duration, aggravating/relieving factors, previous treatment...'})),
      h('div',{className:'field'},
        h('label',null,'Pain scale — '+note.s.pain+'/10'),
        h('input',{type:'range',min:0,max:10,step:1,value:note.s.pain,onChange:e=>upS('pain',parseInt(e.target.value)),style:{padding:0,border:'none',boxShadow:'none',background:'transparent'}})
      )
    ),
    h('div',{className:'card',style:{marginBottom:'1rem'}},
      h('div',{className:'sec'},'Red flag screening'),
      h('div',{style:{fontSize:12,color:'#718096',marginBottom:10}},'Select any that apply. All flagged items will be bolded in the clinical note.'),
      RED_FLAGS.map(f=>h('div',{key:f.id,className:`flag-row${note.s.flags.includes(f.label)?' on':''}`,onClick:()=>togFlag(f.label)},
        h('input',{type:'checkbox',checked:note.s.flags.includes(f.label),readOnly:true,style:{width:14,height:14,flexShrink:0,marginTop:1,cursor:'pointer'}}),
        h('span',{style:{fontSize:13,color:note.s.flags.includes(f.label)?'#C53030':'inherit'}},f.label,f.critical&&' ⚠')
      )),
      note.s.flags.length>0&&h('div',{style:{marginTop:10,padding:'10px 12px',background:'#FFF5F5',borderRadius:8,fontSize:13,color:'#C53030',fontWeight:500,border:'1px solid #FC8181'}},'⚠ Red flags noted. Duty of candour applies — discuss findings with patient and consider onward referral.')
    ),
    h('div',{style:{display:'flex',justifyContent:'flex-end'}},h('button',{className:'btn',onClick:()=>setStep(2)},'Next: Objective →'))
  );

  if(step===2)return h('div',{style:{flex:1,overflowY:'auto',padding:'1.5rem',maxWidth:700}},
    header,
    h('div',{className:'card',style:{marginBottom:'1rem'}},
      h('div',{className:'field'},h('label',null,'Postural observation'),h('textarea',{rows:2,value:note.o.posture,onChange:e=>upO('posture',e.target.value),placeholder:'Anterior/posterior pelvic tilt, shoulder height, head carriage, C-curve, upper crossed syndrome...'})),
      h('div',{className:'field'},h('label',null,'Range of movement'),h('textarea',{rows:2,value:note.o.rom,onChange:e=>upO('rom',e.target.value),placeholder:'Flexion, extension, lateral flexion, rotation — note restrictions and percentages...'})),
      h('div',{className:'field'},h('label',null,'Palpation findings'),h('textarea',{rows:2,value:note.o.palpation,onChange:e=>upO('palpation',e.target.value),placeholder:'Tenderness, hypertonicity, segmental findings, muscle tone...'}))
    ),
    h('div',{className:'card',style:{marginBottom:'1rem'}},
      h('div',{style:{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:10}},
        h('div',{className:'sec',style:{margin:0}},'McTimoney 24-step protocol'),
        h('button',{className:'btn-outline btn-sm',onClick:()=>upO('steps',[...STEPS])},'Select all')
      ),
      h('div',{style:{display:'grid',gridTemplateColumns:'1fr 1fr',gap:6}},
        STEPS.map(s=>h('div',{key:s,className:`check-row${note.o.steps.includes(s)?' on':''}`,onClick:()=>togStep(s)},
          h('input',{type:'checkbox',checked:note.o.steps.includes(s),readOnly:true,style:{width:14,height:14,flexShrink:0,cursor:'pointer'}}),
          h('span',{style:{fontSize:13}},s)
        ))
      ),
      h('div',{style:{fontSize:12,color:'#718096',marginTop:8}},note.o.steps.length+' of '+STEPS.length+' areas documented')
    ),
    h('div',{style:{display:'flex',justifyContent:'flex-end'}},h('button',{className:'btn',onClick:()=>setStep(3)},'Next: Assessment →'))
  );

  if(step===3)return h('div',{style:{flex:1,overflowY:'auto',padding:'1.5rem',maxWidth:620}},
    header,
    h('div',{className:'card',style:{marginBottom:'1rem'}},
      h('div',{className:'field'},h('label',null,'Clinical impression'),h('textarea',{rows:3,value:note.a.impression,onChange:e=>upA('impression',e.target.value),placeholder:'Diagnosis, dysfunction pattern, likely aetiology, neurological findings...'})),
      h('div',{className:'field'},h('label',null,'Differential diagnosis / additional notes'),h('textarea',{rows:2,value:note.a.differential,onChange:e=>upA('differential',e.target.value),placeholder:'Rule-outs considered, referral considerations...'}))
    ),
    h('div',{style:{display:'flex',justifyContent:'flex-end'}},h('button',{className:'btn',onClick:()=>setStep(4)},'Next: Plan →'))
  );

  if(step===4)return h('div',{style:{flex:1,overflowY:'auto',padding:'1.5rem',maxWidth:620}},
    header,
    h('div',{className:'card',style:{marginBottom:'1rem'}},
      h('div',{className:'field'},h('label',null,'Treatment delivered'),h('textarea',{rows:2,value:note.p.treatment,onChange:e=>upP('treatment',e.target.value),placeholder:'Adjustments applied, regions treated, specific techniques used...'})),
      h('div',{style:{marginBottom:'1rem'}},
        h('div',{style:{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:8}},
          h('label',{style:{marginBottom:0}},'Exercises prescribed'),
          h('button',{className:'btn-outline btn-sm',onClick:()=>upP('exercises',EXERCISES.map(e=>e.id))},'All four')
        ),
        EXERCISES.map(e=>h('div',{key:e.id,className:`check-row${note.p.exercises.includes(e.id)?' on':''}`,onClick:()=>togEx(e.id)},
          h('input',{type:'checkbox',checked:note.p.exercises.includes(e.id),readOnly:true,style:{width:14,height:14,flexShrink:0,cursor:'pointer'}}),
          h('span',{style:{fontSize:13}},e.label)
        ))
      ),
      h('div',{className:'field'},h('label',null,'Patient education given'),h('textarea',{rows:2,value:note.p.education,onChange:e=>upP('education',e.target.value),placeholder:'Postural advice, ergonomic guidance, C-curve explanation, upper crossed syndrome, lifestyle...'})),
      h('div',{className:'field'},h('label',null,'Follow-up plan'),h('input',{value:note.p.followup,onChange:e=>upP('followup',e.target.value),placeholder:'e.g. Review in 2 weeks — reassess lumbar ROM and pain levels'}))
    ),
    h('div',{style:{display:'flex',gap:10,justifyContent:'flex-end'}},
      h('button',{className:'btn-outline',onClick:onCancel},'Cancel'),
      h('button',{className:'btn',onClick:()=>onSave(note)},'✓ Save note')
    )
  );
}

// ── ROOT APP ───────────────────────────────────────────────────────
function App(){
  const [user,setUser]=React.useState(null);
  const [patients,setPatients]=React.useState([]);
  const [screen,setScreen]=React.useState('patients');
  const [sub,setSub]=React.useState(null);
  const [selected,setSelected]=React.useState(null);
  const [viewNote,setViewNote]=React.useState(null);

  function login(u){setUser(u);}
  function logout(){setUser(null);setPatients([]);setSelected(null);setSub(null);}

  function handleImport(pts){
    setPatients(pts);
    setSub(null);
    setScreen('patients');
  }

  function selectPatient(p){
    setSelected(patients.find(x=>x.id===p.id)||p);
    setSub('detail');
  }

  function saveNote(note){
    const n={...note,id:Date.now()};
    setPatients(ps=>ps.map(p=>p.id===selected.id?{...p,notes:[n,...p.notes]}:p));
    setSelected(prev=>({...prev,notes:[n,...(prev.notes||[])]}));
    setSub('detail');
  }

  function savePatient(form){
    const np={...form,id:'new-'+Date.now(),patientNumber:'',notes:[],joined:new Date().toISOString().split('T')[0],lastVisit:''};
    setPatients(ps=>[np,...ps]);
    setSelected(np);
    setSub('detail');
  }

  if(!user)return h(Login,{onLogin:login});

  let content;
  if(sub==='import') content=h(ImportScreen,{onImport:handleImport,existing:patients.length});
  else if(sub==='newPatient') content=h(NewPatientForm,{onSave:savePatient,onCancel:()=>setSub(null)});
  else if(sub==='newNote'&&selected) content=h(SOAPForm,{patient:selected,onSave:saveNote,onCancel:()=>setSub('detail')});
  else if(sub==='viewNote'&&viewNote) content=h(NoteView,{note:viewNote,onBack:()=>{setSub('detail');setViewNote(null);}});
  else if(sub==='detail'&&selected){
    const fresh=patients.find(p=>p.id===selected.id)||selected;
    content=h(PatientDetail,{patient:fresh,onBack:()=>{setSelected(null);setSub(null);},onNewNote:()=>setSub('newNote'),onViewNote:n=>{setViewNote(n);setSub('viewNote');}});
  } else {
    content=h(PatientList,{patients,onSelect:selectPatient,onNew:()=>setSub('newPatient'),onImport:()=>setSub('import')});
  }

  return h('div',{style:{display:'flex',minHeight:'100vh'}},
    h(Sidebar,{view:screen,setView:v=>{setScreen(v);setSub(null);setSelected(null);},patientCount:patients.length,onLogout:logout}),
    h('div',{style:{flex:1,display:'flex',flexDirection:'column',minHeight:'100vh',minWidth:0}},
      h('div',{style:{background:'#EBF4FF',borderBottom:'1px solid #BEE3F8',padding:'7px 16px',fontSize:12,color:NAVY,display:'flex',alignItems:'center',gap:8}},
        h('span',null,'🔒'),
        h('span',null,'Demo mode — data is in memory only. Connect Google Sheets for persistent, GDPR-compliant storage.'),
        patients.length===0&&h('span',{style:{marginLeft:'auto',fontWeight:600,cursor:'pointer',textDecoration:'underline'},onClick:()=>setSub('import')},'⬆ Import Janeapp data →')
      ),
      h('div',{style:{flex:1,display:'flex',overflowY:'auto'}},content)
    )
  );
}

const h=React.createElement;
ReactDOM.render(h(App),document.getElementById('app'));
</script>
</body>
</html>
